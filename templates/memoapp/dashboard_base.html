{% extends "memoapp/base.html" %}
{% load static %}

{% block content %}
<div class="dashboard-shell">
    <aside class="sidebar sidebar-pro">
        <div>
            <div class="brand-box">
                <div class="brand-icon">▶</div>
                <div>
                    <div class="brand-title">MemoVision Pro</div>
                    <div class="brand-mode">Demo mode</div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="{% url 'new_analysis' %}" class="nav-item {% if request.resolver_match.url_name in 'new_analysis dashboard analysis_detail' %}active{% endif %}"><span>⊕</span>Yeni Analiz</a>
                <a href="{% url 'projects' %}" class="nav-item {% if request.resolver_match.url_name == 'projects' %}active{% endif %}"><span>🕘</span>Geçmiş Analizler</a>
                <a href="{% url 'public_plans' %}" class="nav-item {% if request.resolver_match.url_name == 'public_plans' %}active{% endif %}"><span>💠</span>Planlar</a>
                <a href="{% url 'settings_page' %}" class="nav-item {% if request.resolver_match.url_name == 'settings_page' %}active{% endif %}"><span>⚙</span>Ayarlar</a>
            </nav>
        </div>

        <div>
            <div class="plan-card pro-plan-card">
                <div class="plan-head">
                    <div class="plan-title">{{ current_plan.name }} Plan</div>
                    
                </div>
                <div class="plan-sub">{{ remaining_text|cut:" " }} analiz hakkı</div>
                
                <div class="progress-bar"><div class="progress-fill" style="width:{{ progress_pct }}%"></div></div>
                <a href="{% url 'public_plans' %}" class="plan-link">Planları Gör →</a>
            </div>
            <a href="{% url 'logout' %}" class="nav-item"><span>↪</span>Çıkış</a>
        </div>
    </aside>

    <main class="dashboard-main">{% block dashboard_content %}{% endblock %}</main>
</div>
{% endblock %}
